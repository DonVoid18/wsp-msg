services:
  whatsapp-standalone:
    image: patrickrios/whatsapp-standalone:latest
    restart: unless-stopped
    ports:
      - 3001:3000
    environment:
      WHATSAPP_AUTH_DATA_PATH: "/app/.wwebjs_auth"
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    shm_size: "1gb"

volumes:
  whatsapp_session:
